name: 04 Deploy Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  IMAGE_NAME: github-actions
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  actions: read
  contents: read

jobs:
  deploy-package:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Pull image from ECR
        run: |
          docker pull "${{ secrets.ECR_REGISTRY }}/${IMAGE_NAME}:latest"

      - name: Start container
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${{ secrets.ECR_REGISTRY }}/${IMAGE_NAME}:latest"

      - name: Container check
        run: docker ps

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              echo $(curl "http://127.0.0.1:${APP_PORT}/health")
              exit 0
            fi
            sleep 2
          done
          echo $(curl "http://127.0.0.1:${APP_PORT}/health")
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f "${CONTAINER_NAME}" || true