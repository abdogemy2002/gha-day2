name: 04 Deploy Workflow

on:
  workflow_run:
    workflows: ["02 CI Workflow"]
    types: [completed]
    # Only fire when CI ran on main — which only happens after a PR is merged.
    branches: [main]

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  actions: read
  contents: read

jobs:
  deploy-package:
    # Guard against CI failures — only deploy green builds.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: downloaded-artifact

      - name: Show downloaded files
        run: ls -R downloaded-artifact

      - name: Load Docker image
        run: docker load --input "downloaded-artifact/${IMAGE_TAR}"

      - name: Recreate image tag from build run
        id: image-tag
        run: |
          BUILD_DATE="$(echo "${{ github.event.workflow_run.created_at }}" | cut -dT -f1)"
          IMAGE_TAG="${BUILD_DATE}-${{ github.event.workflow_run.id }}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Start container
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"

      - name: Container check
        run: docker ps

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              echo $(curl "http://127.0.0.1:${APP_PORT}/health")
              exit 0
            fi
            sleep 2
          done
          echo $(curl "http://127.0.0.1:${APP_PORT}/health")
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f "${CONTAINER_NAME}" || true