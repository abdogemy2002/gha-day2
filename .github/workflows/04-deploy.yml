name: 04 Deploy Workflow

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  IMAGE_NAME: github-actions
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  actions: read
  contents: read

jobs:
  deploy-package:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEYID}}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: us-east-1

     
      - name: Write SSH key to file
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          printf '%s\n' "$EC2_SSH_KEY" > ec2_key.pem
          chmod 600 ec2_key.pem

      - name: Deploy to EC2
        run: |
          ECR_PASSWORD=$(aws ecr get-login-password --region us-east-1)

          ssh -o StrictHostKeyChecking=no -i ec2_key.pem ubuntu@${{ secrets.EC2_HOST }} << EOF
            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            docker pull "${{ secrets.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

            docker rm -f ${{ env.CONTAINER_NAME }} || true

            docker run -d \
              --name "${{ env.CONTAINER_NAME }}" \
              --restart unless-stopped \
              -p "${{ env.APP_PORT }}:8000" \
              "${{ secrets.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          EOF

          
      - name: Cleanup SSH key
        if: always()
        run: rm -f ec2_key.pem

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://${{ secrets.EC2_HOST }}:${APP_PORT}/health"; then
              echo $(curl "http://${{ secrets.EC2_HOST }}:${APP_PORT}/health")
              exit 0
            fi
            sleep 2
          done
          echo $(curl "http://${{ secrets.EC2_HOST }}:${APP_PORT}/health")
          exit 1